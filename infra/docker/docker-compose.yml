services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: yasar
      POSTGRES_PASSWORD: yasar
      POSTGRES_DB: yasar_nuri
    ports:
      - "5432:5432"
    volumes:
      - yasar_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yasar -d yasar_nuri"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://yasar:yasar@postgres:5432/yasar_nuri
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn yasar_nuri_api.main:app --host 0.0.0.0 --port 8000"

volumes:
  yasar_pg:
